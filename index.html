<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hosted Foam Form</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      background: #eff5ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 32%),
                  radial-gradient(circle at bottom right, rgba(59,130,246,0.08), transparent 24%),
                  #eff5ff;
    }

    .container {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      border-radius: 28px;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      padding: 28px;
      overflow: hidden;
    }

    .hero {
      max-width: 560px;
      margin: 0 auto 24px;
      text-align: center;
    }

    .hero p {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #2563eb;
      font-weight: 700;
    }

    .hero h1 {
      margin: 14px 0 0;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.1;
      color: #0f172a;
    }

    .hero span {
      display: block;
      margin-top: 16px;
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.75;
    }

    .embed-wrapper {
      min-height: 420px;
      width: 100%;
      margin: 16px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .embed-wrapper > * {
      width: 100%;
      max-width: 760px;
    }

    @media (max-width: 780px) {
      .container {
        width: 100%;
        padding: 18px;
      }

      .card {
        padding: 20px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      .hero {
        margin-bottom: 20px;
      }

      .hero h1 {
        font-size: 1.85rem;
      }

      .embed-wrapper {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="hero">
        <p>Hosted Foam</p>
        <h1>Modern, clean, and polished form experience</h1>
        <span>Fill out the form below in a sleek, responsive layout. Your embedded form is rendered through the provided script source.</span>
      </div>
      <div class="embed-wrapper">
        <script src="https://brain.hanzla.com/api/public/forms/untitled-form-2-5806c50c/embed.js"></script>
      </div>
    </div>
  </div>
</body>
</html>
